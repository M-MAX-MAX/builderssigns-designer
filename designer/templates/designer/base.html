{% load static %}
<!DOCTYPE html>
<html lang="en-au">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Design Your Banner — Builders Signs{% endblock %}</title>
  <link rel="icon" type="image/png" href="{% static 'designer/favicon/favicon.png' %}">
  <style>
    /* Self-hosted (not Google Fonts CDN) so the site isn't affected by
       browsers/extensions that block fonts.googleapis.com by default. */
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 400 700;
      font-display: swap;
      src: url('{% static "designer/fonts/inter-var.woff2" %}') format('woff2');
    }
    :root { --bs-yellow: #f5c518; --bs-black: #111111; }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; margin: 0; color: var(--bs-black); background: #fafafa; }
    header { display: flex; align-items: center; padding: 16px 32px; background: #fff; border-bottom: 1px solid #eee; }
    header .logo { font-weight: 700; font-size: 18px; }
    main { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
    h1 { color: #171717; font-size: 30px; font-weight: 600; line-height: 38px; margin: 0 0 20px; }
    .description { color: #525252; font-size: 16px; font-weight: 400; line-height: 24px; margin: 0 0 24px; }

    /* Stepper */
    .stepper-wrapper { position: relative; display: flex; align-items: center; width: 170px; margin-bottom: 24px; }
    .stepper-line { position: absolute; top: 50%; left: 10px; right: 10px; transform: translateY(-50%); border-top: 1px dashed #D4D4D4; z-index: 1; }
    .steps { display: flex; justify-content: space-between; width: 100%; position: relative; z-index: 2; }
    .steps a, .steps span {
      width: 30px; height: 30px; box-sizing: border-box; border-radius: 50%; display: flex;
      justify-content: center; align-items: center; font-size: 10px; font-weight: 600; text-decoration: none;
      background: #FAFAFA; color: #525252; border: 1px solid #E5E5E5;
    }
    .steps a.active { background: #0A0A0A; color: #fff; border-color: #0A0A0A; }

    /* Group divider */
    .divider-container { display: flex; align-items: center; width: 100%; gap: 14px; margin: 32px 0 16px; }
    .divider-line { flex-grow: 1; height: 1px; }
    .divider-line.left { background: linear-gradient(to right, rgba(212,212,212,0) 0%, #D4D4D4 100%); }
    .divider-line.right { background: linear-gradient(to left, rgba(212,212,212,0) 0%, #D4D4D4 100%); }
    .divider-badge {
      display: flex; align-items: center; gap: 4px; padding: 4px 10px 4px 12px; background: #FAFAFA;
      border-radius: 16px; border: 1px solid #E5E5E5; color: #404040; font-size: 14px; font-weight: 500; line-height: 20px;
    }

    fieldset { border: none; padding: 0; margin: 0 0 20px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    input[type=text], input[type=email], input[type=url], input[type=file], select, textarea {
      width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; margin-bottom: 4px;
    }
    textarea { min-height: 90px; }
    .colour-field { display: flex; align-items: center; gap: 12px; }
    input[type=color] {
      width: 52px; height: 44px; padding: 4px; border: 1px solid #ccc; border-radius: 4px;
      cursor: pointer; background: #fff; flex-shrink: 0;
    }
    .colour-hex { font-size: 14px; color: #444; font-family: monospace; text-transform: uppercase; }
    .field { margin-bottom: 18px; }
    .help { color: #777; font-size: 12px; }
    .errorlist { color: #c0392b; font-size: 12px; margin: 0 0 6px; padding: 0; list-style: none; }
    .btn { display: inline-block; background: var(--bs-yellow); color: var(--bs-black); font-weight: 700; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-size: 15px; text-decoration: none; }
    .btn:hover { opacity: .9; }
    .btn-secondary { background: #eee; }
    .button-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .checkbox-row label { display: inline-flex; align-items: center; gap: 6px; font-weight: 400; margin-right: 16px; }
    .checkbox-row input { width: auto; margin-bottom: 0; }
    .gallery-group { margin-bottom: 40px; }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-top: 16px; }
    .tile { border: 1px solid #e5e5e5; border-radius: 6px; overflow: hidden; background: #fff; }
    .tile img { width: 100%; display: block; cursor: zoom-in; }
    .tile .tile-label { margin: 0; padding: 8px 10px 0; font-size: 13px; color: #444; }
    .tile .tile-footer { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px 8px; }
    .tile .zoom-btn { border: none; background: none; cursor: zoom-in; font-size: 16px; }
    .tile .use-btn { font-size: 12px; padding: 6px 10px; }
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); align-items: center; justify-content: center; z-index: 50; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; background: #fff; }
    .lightbox-close { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 28px; cursor: pointer; background: none; border: none; }

    .font-picker { position: relative; }
    .font-picker-toggle {
      width: 100%; text-align: left; padding: 10px 12px; border: 1px solid #ccc; border-radius: 4px;
      background: #fff; font-size: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
    }
    .font-picker-toggle::after { content: "▾"; color: #888; font-size: 12px; margin-left: 8px; }
    .font-picker-list {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #fff; border: 1px solid #ccc;
      border-radius: 4px; max-height: 260px; overflow-y: auto; z-index: 10; box-shadow: 0 4px 12px rgba(0,0,0,.08);
    }
    .font-picker-option {
      display: block; width: 100%; text-align: left; padding: 10px 12px; border: none; background: none;
      cursor: pointer; font-size: 16px;
    }
    .font-picker-option:hover, .font-picker-option:focus { background: #f5f5f5; }
    .font-picker-option .font-caps { display: block; text-transform: uppercase; font-size: 13px; color: #888; margin-top: 2px; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header>
    <div class="logo">Builders Signs — Design Your Banner</div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
