{% load static %}
<!DOCTYPE html>
<html lang="en-au">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Design Your Banner — Builders Signs{% endblock %}</title>
  <link rel="icon" type="image/png" href="{% static 'designer/favicon/favicon.png' %}">
  <style>
    /* Self-hosted (not Google Fonts CDN) so the site isn't affected by
       browsers/extensions that block fonts.googleapis.com by default. */
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 400 700;
      font-display: swap;
      src: url('{% static "designer/fonts/inter-var.woff2" %}') format('woff2');
    }
    :root { --bs-yellow: #FFCC00; --bs-ink: #332900; --bs-black: #111111; }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; margin: 0; color: #171717; background: #fafafa; }
    header { display: flex; align-items: center; padding: 16px 32px; background: #fff; border-bottom: 1px solid #eee; }
    header .logo { font-weight: 700; font-size: 18px; }
    main { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
    h1 { color: #171717; font-size: 30px; font-weight: 600; line-height: 38px; margin: 0 0 20px; }
    .description { color: #525252; font-size: 16px; font-weight: 400; line-height: 24px; margin: 0 0 24px; }

    /* Stepper */
    .stepper-wrapper { position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 32px; }
    .stepper-line { position: absolute; top: 50%; left: 30px; right: 30px; transform: translateY(-50%); border-top: 2px dashed #D4D4D4; z-index: 1; }
    .steps { display: flex; justify-content: space-between; gap: 60px; position: relative; z-index: 2; }
    .steps a, .steps span {
      width: 60px; height: 60px; box-sizing: border-box; border-radius: 50%; display: flex;
      justify-content: center; align-items: center; font-size: 18px; font-weight: 600; text-decoration: none;
      background: #FAFAFA; color: #525252; border: 2px solid #E5E5E5;
    }
    .steps a.active, .steps span.active { background: #F0FDF4; color: #15803D; border-color: #15803D; }

    /* Group divider */
    .divider-container { display: flex; align-items: center; width: 100%; gap: 14px; margin: 32px 0 16px; }
    .divider-line { flex-grow: 1; height: 1px; }
    .divider-line.left { background: linear-gradient(to right, rgba(212,212,212,0) 0%, #D4D4D4 100%); }
    .divider-line.right { background: linear-gradient(to left, rgba(212,212,212,0) 0%, #D4D4D4 100%); }
    .divider-badge {
      display: flex; align-items: center; gap: 4px; padding: 4px 10px 4px 12px; background: #FAFAFA;
      border-radius: 16px; border: 1px solid #E5E5E5; color: #404040; font-size: 14px; font-weight: 500; line-height: 20px;
    }

    fieldset { border: none; padding: 0; margin: 0 0 20px; }
    label { display: block; color: #404040; font-size: 14px; font-weight: 500; line-height: 20px; margin-bottom: 6px; }
    label .req { color: #EF4444; }
    input[type=text], input[type=email], input[type=url], input[type=file], select, textarea {
      width: 100%; height: 44px; padding: 10px 14px; background: #fff; border: 1px solid #D4D4D4; border-radius: 8px;
      font-size: 16px; font-family: 'Inter', sans-serif; color: #171717; box-shadow: 0px 1px 2px rgba(0,0,0,0.05);
      outline: none; transition: border-color .2s;
    }
    input:focus, select:focus, textarea:focus { border-color: #a3a3a3; }
    input::placeholder { color: #737373; }
    textarea { height: 128px; min-height: 128px; resize: vertical; }
    .colour-field { display: flex; align-items: center; gap: 12px; }
    .colour-btn {
      width: 44px; height: 44px; flex-shrink: 0; background: #fff; border: 1px solid #D4D4D4; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; box-shadow: 0px 1px 2px rgba(0,0,0,0.05);
    }
    input[type=color] {
      -webkit-appearance: none; appearance: none; width: 24px; height: 24px; padding: 0; border: none;
      border-radius: 50%; cursor: pointer; background: none; overflow: hidden;
    }
    input[type=color]::-webkit-color-swatch-wrapper { padding: 0; border-radius: 50%; }
    input[type=color]::-webkit-color-swatch { border: none; border-radius: 50%; }
    .colour-hex { font-size: 14px; color: #444; font-family: monospace; text-transform: uppercase; }
    .field { margin-bottom: 18px; }
    .row-2-col { display: flex; gap: 20px; }
    .row-2-col .field { flex: 1; margin-bottom: 0; }
    .help { color: #737373; font-size: 12px; line-height: 18px; }
    .errorlist { color: #B91C1C; font-size: 12px; margin: 0 0 6px; padding: 0; list-style: none; }
    .btn {
      display: inline-block; flex: 1; background: var(--bs-yellow); color: var(--bs-ink); font-weight: 600;
      border: 1px solid var(--bs-yellow); padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 16px;
      text-decoration: none; text-align: center; box-shadow: 0px 1px 2px rgba(0,0,0,0.05); transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn-secondary { background: transparent; color: var(--bs-ink); border: 1px solid var(--bs-ink); box-shadow: none; }
    .button-row { display: flex; gap: 20px; flex-wrap: wrap; }
    .checkbox-row { display: flex; align-items: center; gap: 20px; min-height: 44px; }
    .checkbox-row label { display: inline-flex; align-items: center; gap: 8px; font-weight: 500; margin: 0; white-space: nowrap; }
    .checkbox-row input { width: auto; height: auto; margin-bottom: 0; }
    .gallery-group { margin-bottom: 40px; }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-top: 16px; }
    .tile { border: 1px solid #e5e5e5; border-radius: 6px; overflow: hidden; background: #fff; }
    .tile img { width: 100%; display: block; cursor: zoom-in; }
    .tile .tile-label { margin: 0; padding: 8px 10px 0; font-size: 13px; color: #444; }
    .tile .tile-footer { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px 8px; }
    .tile .zoom-btn { border: none; background: none; cursor: zoom-in; font-size: 16px; }
    .tile .use-btn { flex: none; font-size: 12px; padding: 6px 10px; }
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); align-items: center; justify-content: center; z-index: 50; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; background: #fff; }
    .lightbox-close { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 28px; cursor: pointer; background: none; border: none; }

    .font-picker { position: relative; }
    .font-picker-toggle {
      width: 100%; height: 44px; text-align: left; padding: 10px 14px; border: 1px solid #D4D4D4; border-radius: 8px;
      background: #fff; font-size: 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0px 1px 2px rgba(0,0,0,0.05);
    }
    .font-picker-toggle::after { content: "▾"; color: #525252; font-size: 12px; margin-left: 8px; }
    .font-picker-list {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #fff; border: 1px solid #E5E5E5;
      border-radius: 8px; max-height: 320px; overflow-y: auto; z-index: 10;
      box-shadow: 0px 4px 6px -2px rgba(0,0,0,0.03), 0px 12px 16px -4px rgba(0,0,0,0.08);
    }
    .font-picker-option {
      display: block; width: 100%; text-align: left; padding: 10px 14px; border: none; background: none;
      cursor: pointer; font-size: 16px; color: #171717;
    }
    .font-picker-option:hover, .font-picker-option:focus { background: #FAFAFA; }
    .font-picker-option .font-caps { display: block; text-transform: uppercase; font-size: 13px; color: #888; margin-top: 2px; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header>
    <div class="logo">Builders Signs — Design Your Banner</div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
